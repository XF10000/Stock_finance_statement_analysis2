# 资产负债表公司特定重分类规则配置文件
# 
# 详细说明请参考：docs/Company_Specific_Reclassification_Requirements.md

company_rules:
  
  # 美的集团：将其他非流动资产从经营资产重分类为金融资产
  "000333.SZ":
    reclassify:
      其他非流动资产:
        from: 长期经营资产合计
        to: 金融资产合计
        reason: "固定收益类产品，实质为金融资产"
  
  # 在此添加其他公司特定的重分类规则
  # 示例格式请参考 company_specific_rules.yaml.template
  
