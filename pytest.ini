[pytest]
# pytest 配置文件

# 测试文件搜索模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 输出选项
addopts = -v --tb=short --strict-markers -ra --color=yes

# 标记定义
markers =
    slow: 标记慢速测试
    integration: 标记集成测试
    unit: 标记单元测试
    database: 标记数据库相关测试

# 最小Python版本
minversion = 6.0

# 日志配置
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG
